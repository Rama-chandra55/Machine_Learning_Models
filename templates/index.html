<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Digit Recognition System</title>
    <style>
        /* Modernized Deep Charcoal & Cyberpunk Purple Theme Palette */
        :root {
            --bg-main: #0b0f19;
            --bg-card: #161b26;
            --accent-glow: #8b5cf6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #2d3748;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin: 0 0 40px 0;
        }

        .workspace-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            width: 100%;
            max-width: 950px;
        }

        .canvas-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        canvas {
            background-color: #ffffff;
            border-radius: 12px;
            cursor: crosshair;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            touch-action: none;
        }

        .btn-clear {
            margin-top: 15px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            transition: color 0.2s ease;
        }

        .btn-clear:hover {
            color: var(--accent-glow);
        }

        /* -----------------------------------------------------------
           DASHBOARD TRACKING GRID DESIGN SYSTEM
           ----------------------------------------------------------- */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            width: 100%;
            background-color: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        .primary-output-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border-color);
            padding-right: 20px;
        }

        /* Adjusted layout grid to cleanly balance all 10 sub-digits */
        .probabilities-subgrid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }

        .dial-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .dial-svg {
            transform: rotate(-90deg);
        }

        .dial-bg {
            fill: none;
            stroke: #1e293b;
        }

        .dial-progress {
            fill: none;
            stroke: var(--accent-glow);
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease-out;
        }

        .dial-label-center {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            top: 50%;
            transform: translateY(-50%);
        }

        .primary-digit-text {
            font-size: 5rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
        }

        .primary-percentage-text {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 4px;
        }

        .sub-digit-class-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .sub-percentage-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        @media(max-width: 768px) {
            .metrics-grid {
                grid-template-columns: 1fr;
            }
            .probabilities-subgrid {
                grid-template-columns: repeat(3, 1fr);
            }
            .primary-output-wrapper {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding-right: 0;
                padding-bottom: 30px;
            }
        }
    </style>
</head>
<body>

    <h1>AI Digit Recognition</h1>
    <p class="subtitle">Draw a digit inside the box below to view real-time architectural evaluations</p>

    <div class="workspace-layout">

        <div class="canvas-area">
            <canvas id="predictionCanvas" width="280" height="280"></canvas>
            <button class="btn-clear" onclick="resetCanvasEngine()">Clear Canvas</button>
        </div>

        <div class="metrics-grid">

            <div class="primary-output-wrapper">
                <div class="dial-container">
                    <svg class="dial-svg" width="200" height="200">
                        <circle class="dial-bg" cx="100" cy="100" r="85" stroke-width="10"></circle>
                        <circle id="main-progress-ring" class="dial-progress" cx="100" cy="100" r="85" stroke-width="10" stroke-dasharray="534" stroke-dashoffset="534"></circle>
                    </svg>
                    <div class="dial-label-center">
                        <div id="winner-digit" class="primary-digit-text">-</div>
                        <div id="winner-percentage" class="primary-percentage-text">0%</div>
                    </div>
                </div>
            </div>

            <div class="probabilities-subgrid">
                <script>
                    for (let i = 0; i <= 9; i++) {
                        document.write(`
                            <div class="dial-container">
                                <svg class="dial-svg" width="80" height="80">
                                    <circle class="dial-bg" cx="40" cy="40" r="32" stroke-width="4"></circle>
                                    <circle id="ring-class-${i}" class="dial-progress" cx="40" cy="40" r="32" stroke-width="4" stroke-dasharray="201" stroke-dashoffset="201"></circle>
                                </svg>
                                <div class="dial-label-center">
                                    <div class="sub-digit-class-title">${i}</div>
                                    <div id="text-class-${i}" class="sub-percentage-text">0%</div>
                                </div>
                            </div>
                        `);
                    }
                </script>
            </div>

        </div>
    </div>

    <script>
        const canvas = document.getElementById('predictionCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let strokeDebounceTimeout;

        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 18;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';

        function resetCanvasEngine() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            updateVisualDials(Array(10).fill(0));
            document.getElementById('winner-digit').innerText = '-';
        }
        resetCanvasEngine();

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; trackStroke(e); });
        canvas.addEventListener('mousemove', trackStroke);
        window.addEventListener('mouseup', () => { if(isDrawing) { isDrawing = false; ctx.beginPath(); planServerTransmission(); } });

        canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); const t = e.touches[0]; trackStroke(t); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); const t = e.touches[0]; trackStroke(t); });
        canvas.addEventListener('touchend', () => { if(isDrawing) { isDrawing = false; ctx.beginPath(); planServerTransmission(); } });

        function trackStroke(e) {
            if (!isDrawing) return;
            const boundingBox = canvas.getBoundingClientRect();
            const clientX = e.clientX - boundingBox.left;
            const clientY = e.clientY - boundingBox.top;

            ctx.lineTo(clientX, clientY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(clientX, clientY);
        }

        function planServerTransmission() {
            clearTimeout(strokeDebounceTimeout);
            strokeDebounceTimeout = setTimeout(dispatchPayloadToBackend, 200);
        }

        function updateVisualDials(probabilitiesArray) {
            const maxVal = Math.max(...probabilitiesArray);
            const topPredictionIndex = probabilitiesArray.indexOf(maxVal);

            // Handle edge case where canvas is cleared or empty
            if (maxVal === 0) {
                document.getElementById('winner-digit').innerText = '-';
                document.getElementById('winner-percentage').innerText = '0%';
                document.getElementById('main-progress-ring').style.strokeDashoffset = 534;
                for (let i = 0; i <= 9; i++) {
                    document.getElementById(`ring-class-${i}`).style.strokeDashoffset = 201;
                    document.getElementById(`text-class-${i}`).innerText = '0%';
                }
                return;
            }

            const topProbabilityValue = probabilitiesArray[topPredictionIndex];

            // Update Primary Winner View
            const mainRingElement = document.getElementById('main-progress-ring');
            const mainCircumference = 534;
            mainRingElement.style.strokeDashoffset = mainCircumference - (topProbabilityValue / 100) * mainCircumference;
            document.getElementById('winner-digit').innerText = topPredictionIndex;
            document.getElementById('winner-percentage').innerText = `${Math.round(topProbabilityValue)}%`;

            // Update all 10 sub-distribution values (0 to 9)
            for (let i = 0; i <= 9; i++) {
                const subRingElement = document.getElementById(`ring-class-${i}`);
                const subTextElement = document.getElementById(`text-class-${i}`);
                const value = probabilitiesArray[i];
                const subCircumference = 201;

                subRingElement.style.strokeDashoffset = subCircumference - (value / 100) * subCircumference;
                subTextElement.innerText = `${Math.round(value)}%`;
            }
        }

        function dispatchPayloadToBackend() {
            const dataURL = canvas.toDataURL('image/jpeg');

            fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataURL })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    updateVisualDials(data.distribution);
                }
            })
            .catch(err => console.error("Communication pipeline failure:", err));
        }
    </script>
</body>
</html>
